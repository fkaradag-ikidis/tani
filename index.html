<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semptomdan Tanıya | Dr. Feridun Karadağ</title>
    <style>
        /* Buraya önceki index.html dosyasındaki tüm CSS kodunu koyuyorum (kısaltılmış hali) */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f1f5f9; color: #1e293b; line-height: 1.6; padding-bottom: 100px; }
        .header { background: linear-gradient(135deg, #2563eb, #1d4ed8); color: white; padding: 1.5rem; text-align: center; position: sticky; top: 0; z-index: 100; }
        .container { max-width: 900px; margin: 0 auto; padding: 1rem; }
        .card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .btn-primary { background: #2563eb; color: white; border: none; padding: 1rem 2rem; font-size: 1.2rem; border-radius: 10px; width: 100%; cursor: pointer; margin: 1rem 0; }
        .disease-item { border: 2px solid #e2e8f0; border-radius: 10px; padding: 1rem; margin-bottom: 1rem; }
        .high-probability { border-left: 6px solid #10b981; }
        .medium-probability { border-left: 6px solid #f59e0b; }
        .empty-state { text-align: center; padding: 3rem; color: #64748b; }
    </style>
</head>
<body>

<div class="header">
    <h1>🩺 Semptomdan Tanıya</h1>
    <p>Dr. Feridun Karadağ | Klinik Karar Destek Sistemi</p>
</div>

<div class="container">
    <div class="card">
        <h2>Hasta Bilgileri</h2>
        <input type="number" id="patientAge" placeholder="Yaş" style="width:100%; padding:10px; margin:5px 0;">
        <select id="patientGender" style="width:100%; padding:10px; margin:5px 0;">
            <option value="">Cinsiyet Seçin</option>
            <option value="erkek">Erkek</option>
            <option value="kadın">Kadın</option>
        </select>
    </div>

    <div class="card">
        <h2>Semptom Seçimi</h2>
        <input type="text" id="symptomSearch" placeholder="Semptom ara..." style="width:100%; padding:10px; margin-bottom:10px;">
        <div id="symptomContainer" style="max-height:400px; overflow-y:auto; border:1px solid #ddd; padding:10px; border-radius:8px;"></div>
        
        <div style="margin-top:15px;">
            <strong>Seçili Semptomlar:</strong>
            <div id="selectedSymptoms" style="min-height:50px; padding:10px; background:#f8fafc; border-radius:8px;"></div>
        </div>
    </div>

    <button class="btn-primary" onclick="analyzeCase()">🔍 Tanı Analizi Başlat</button>

    <div id="loadingSection" style="display:none; text-align:center; padding:2rem;">
        <p>Analiz yapılıyor...</p>
    </div>

    <div id="resultsSection" class="card" style="display:none;">
        <h2>Olası Tanılar</h2>
        <div id="diseaseList"></div>
    </div>
</div>

<script src="veritabani.js"></script>
<script src="algorithm.js"></script>

<script>
// Basit UI Fonksiyonları (eksik olanlar)
let selectedSymptoms = [];

function renderSymptoms(system = 'GenelSistemik') {
    const container = document.getElementById('symptomContainer');
    container.innerHTML = '';
    
    if (!symptomDatabase || !symptomDatabase[system]) return;
    
    symptomDatabase[system].forEach(symptom => {
        const div = document.createElement('div');
        div.textContent = symptom;
        div.style.padding = '10px';
        div.style.margin = '4px';
        div.style.border = '1px solid #ddd';
        div.style.borderRadius = '6px';
        div.style.cursor = 'pointer';
        div.onclick = () => toggleSymptom(symptom);
        if (selectedSymptoms.includes(symptom)) div.style.background = '#2563eb';
        if (selectedSymptoms.includes(symptom)) div.style.color = 'white';
        container.appendChild(div);
    });
}

function toggleSymptom(symptom) {
    if (selectedSymptoms.includes(symptom)) {
        selectedSymptoms = selectedSymptoms.filter(s => s !== symptom);
    } else {
        selectedSymptoms.push(symptom);
    }
    updateSelectedSymptoms();
    renderSymptoms();
}

function updateSelectedSymptoms() {
    const container = document.getElementById('selectedSymptoms');
    container.innerHTML = selectedSymptoms.length === 0 
        ? '<em>Henüz semptom seçilmedi</em>' 
        : selectedSymptoms.map(s => `<span style="background:#2563eb;color:white;padding:4px 10px;border-radius:20px;margin:3px;display:inline-block;">${s}</span>`).join('');
}

function filterSymptoms() {
    // Basit arama (geliştirilebilir)
    renderSymptoms();
}

function analyzeCase() {
    window.analyzeCase();   // algorithm.js'den gelen fonksiyon
}

// Sayfa yüklendiğinde
window.onload = () => {
    renderSymptoms('GenelSistemik');
};
</script>

</body>
</html>
